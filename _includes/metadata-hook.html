<!-- Default to light mode on first load, while keeping the toggle switch -->
<script>
  if (!sessionStorage.getItem('mode')) {
    document.documentElement.setAttribute('data-mode', 'light');
  }
</script>

<!-- Custom avatar alignment for root logo image -->
<style>
  #sidebar #avatar img[src$='/image.png'],
  #sidebar #avatar img[src$='image.png'] {
    transform-origin: center center;
    transform: translate(8px, 22px) scale(1.8);
  }

  #sidebar #avatar img[src$='/image.png']:hover,
  #sidebar #avatar img[src$='image.png']:hover {
    transform: translate(6px, 22px) scale(2);
  }
</style>
